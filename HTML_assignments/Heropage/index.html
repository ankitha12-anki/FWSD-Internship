<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hero Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4ff;
      color: #222;
    }

    /* --- NAVBAR --- */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #2c3e7a;
      padding: 1rem 2rem;
    }

    .logo {
      color: white;
      font-size: 1.3rem;
      font-weight: bold;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .nav-links a {
      color: #cdd5f5;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .nav-links a:hover {
      color: white;
    }

    /* --- HERO SECTION --- */
    .hero {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 4rem 2rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    .hero-text {
      flex: 1;
    }

    .hero-text h1 {
      font-size: 2.2rem;
      margin-bottom: 1rem;
      color: #2c3e7a;
    }

    .hero-text p {
      font-size: 1rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .hero-text button {
      background: #2c3e7a;
      color: white;
      border: none;
      padding: 0.75rem 1.8rem;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
    }

    .hero-text button:hover {
      background: #1e2e60;
    }

    .hero-image {
      flex: 1;
      background: #c5d0f5;
      height: 280px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6678bb;
      font-size: 0.9rem;
    }

    /* --- RESPONSIVE (Mobile) --- */
    @media (max-width: 650px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-image {
        width: 100%;
      }

      .nav-links {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">MySite</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-text">
      <h1>Welcome to My Website</h1>
      <p>This is a simple hero section built using Flexbox.
         It has two columns that stack on mobile screens.</p>
      <button>Get Started</button>
    </div>
    <div class="hero-image">
      Image goes here
    </div>
  </section>

</body>
</html>
